<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Expense Tracker</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <h1>Create Your Account</h1>
    <form id="signupForm">
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password (min 6 characters)" required>
      <button type="submit">Sign Up</button>
    </form>
    <p style="text-align: center; color: #666;">
      Already have an account? <a href="/login.html" style="color: #667eea; text-decoration: none; font-weight: 600;">Login here</a>
    </p>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
