<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Expense Tracker</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <h1>🔐 Login</h1>
    <p style="text-align: center; color: #666; margin-bottom: 30px;">Sign in to your account</p>
    
    <form id="loginForm" style="max-width: 400px; margin: 0 auto;">
      <input 
        type="email" 
        id="email" 
        placeholder="Email" 
        required
        style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 1em;"
      >
      <input 
        type="password" 
        id="password" 
        placeholder="Password" 
        required
        style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; font-size: 1em;"
      >
      <button 
        type="submit"
        style="width: 100%; padding: 10px; background-color: #667eea; color: white; border: none; border-radius: 4px; font-size: 1em; cursor: pointer;"
      >
        Login
      </button>
    </form>

    <p style="text-align: center; margin-top: 20px; color: #666;">
      Don't have an account? <a href="/signup.html" style="color: #667eea; text-decoration: none;">Sign up here</a>
    </p>
    
    <div style="text-align: center; margin-top: 20px;">
      <a href="/" style="color: #667eea; text-decoration: none;">← Back to Home</a>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
